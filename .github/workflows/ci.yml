name: CI Pipeline

on:
  push:
    branches:
      - main
      - 'feature/*'
  pull_request:
    branches:
      - main
      - 'feature/*'

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: erp-backend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check for .env file
        run: |
          if [ -f .env ]; then
            echo "ERROR: .env file found in repository. This is a security risk!"
            exit 1
          fi
          echo "✓ No .env file found"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio httpx

      - name: Lint with Ruff
        run: ruff check .

      - name: Set up Test Environment
        run: |
          cp .env.example .env.test 2>/dev/null || true
          echo "DATABASE_URL=postgresql://test:test@localhost/test" >> .env.test
          echo "JWT_SECRET=ci-jwt-7f3a9b2e1d8c4056f9e2a3c7d1b5e8f0" >> .env.test
          echo "ENV=test" >> .env.test
        env:
          PYTHONPATH: .

      - name: Run Tests
        run: pytest tests/ -v --tb=short --co -q || pytest tests/ -v --tb=short
        env:
          ENV: test
          JWT_SECRET: ci-jwt-7f3a9b2e1d8c4056f9e2a3c7d1b5e8f0
          DATABASE_URL: ""

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: erp-frontend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: erp-frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Report Build Size
        run: du -sh dist/

  security-check:
    name: Security Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Backend Security (pip-audit)
        run: |
          cd erp-backend
          pip install pip-audit
          pip install -r requirements.txt
          pip-audit -r requirements.txt

      - name: Frontend Security (npm audit)
        run: |
          cd erp-frontend
          npm audit --audit-level=high
