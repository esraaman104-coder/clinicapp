services:
  erp-backend:
    build:
      context: ./erp-backend
      dockerfile: Dockerfile
    container_name: erp-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./erp-backend/.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    volumes:
      - erp-logs:/app/logs
    networks:
      - erp-network

networks:
  erp-network:
    driver: bridge

volumes:
  erp-logs:
    name: erp-logs
